<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="輸入關鍵字，快速掌握近期新聞動態。" />
    <title>Latest — 近期新聞搜尋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="nav">
      <a class="brand" href="./" aria-label="Latest 首頁"><span class="brand-mark">L</span> Latest</a>
      <span class="live"><i></i> 即時聚合</span>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow">WHAT'S HAPPENING NOW</p>
        <h1>找到值得你<br /><em>關注的消息。</em></h1>
        <p class="intro">輸入任何關鍵字，快速瀏覽近期新聞與不同媒體觀點。</p>

        <form id="search-form" class="search-box">
          <label class="search-input">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m2.3-5.2a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" /></svg>
            <input id="keyword" name="q" maxlength="80" autocomplete="off" placeholder="搜尋人物、事件或主題" aria-label="新聞關鍵字" required />
          </label>
          <select id="days" aria-label="新聞日期範圍">
            <option value="1">24 小時內</option>
            <option value="3">近 3 天</option>
            <option value="7" selected>近 7 天</option>
            <option value="30">近 30 天</option>
          </select>
          <button type="submit">搜尋新聞 <span>↗</span></button>
        </form>

        <div class="suggestions" aria-label="熱門關鍵字">
          <span>熱門搜尋</span>
          <button>人工智慧</button><button>台積電</button><button>氣候變遷</button><button>運動</button>
        </div>
      </section>

      <section id="results" class="results" hidden>
        <div class="results-head">
          <div><p class="eyebrow">LATEST STORIES</p><h2 id="result-title">搜尋結果</h2></div>
          <p id="result-count"></p>
        </div>
        <div id="status" class="status" role="status"></div>
        <div id="news-grid" class="news-grid"></div>
      </section>
    </main>

    <footer><span>Latest © 2026</span><span>新聞內容與連結歸原始發布者所有</span></footer>
    <script src="./config.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
